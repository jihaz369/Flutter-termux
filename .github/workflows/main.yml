name: Replace Repository From ZIP

on:
  workflow_dispatch:

  push:
    paths:
      - "*.zip"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Replace repository with ZIP contents
        shell: bash
        run: |
          set -e

          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -n1)

          if [ -z "$ZIP" ]; then
            echo "No ZIP file found."
            exit 1
          fi

          echo "Using ZIP: $ZIP"

          # Remove everything except .git, .github and the ZIP
          find . -mindepth 1 \
            ! -path "./.git*" \
            ! -path "./.github*" \
            ! -name "$(basename "$ZIP")" \
            -exec rm -rf {} +

          mkdir temp_extract

          unzip -oq "$ZIP" -d temp_extract

          # If ZIP contains one top-level folder, move its contents
          ITEMS=$(find temp_extract -mindepth 1 -maxdepth 1)

          if [ "$(echo "$ITEMS" | wc -l)" -eq 1 ] && [ -d "$ITEMS" ]; then
            shopt -s dotglob
            mv "$ITEMS"/* .
          else
            shopt -s dotglob
            mv temp_extract/* .
          fi

          rm -rf temp_extract
          rm -f "$ZIP"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Deploy project from ZIP"

      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
