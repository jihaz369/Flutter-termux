name: Universal ZIP Decompress

on:
  push:
    paths:
      - "**.zip"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Find ZIP file
        id: zip
        run: |
          ZIPFILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIPFILE" ]; then
            echo "No ZIP file found."
            exit 1
          fi

          echo "ZIPFILE=$ZIPFILE" >> $GITHUB_ENV
          echo "Using $ZIPFILE"

      - name: Clean repository except .git and .github
        run: |
          find . -mindepth 1 \
            ! -path "./.git*" \
            ! -path "./.github*" \
            -exec rm -rf {} +

      - name: Extract ZIP into repository root
        run: |
          unzip -o "$ZIPFILE" -d .

      - name: Flatten if ZIP contains one top folder
        run: |
          COUNT=$(find . -mindepth 1 -maxdepth 1 -type d ! -name ".git" ! -name ".github" | wc -l)
          FILES=$(find . -mindepth 1 -maxdepth 1 -type f | wc -l)

          if [ "$COUNT" -eq 1 ] && [ "$FILES" -eq 0 ]; then
            DIR=$(find . -mindepth 1 -maxdepth 1 -type d ! -name ".git" ! -name ".github")
            shopt -s dotglob
            mv "$DIR"/* .
            rmdir "$DIR"
          fi

      - name: Remove ZIP
        run: |
          rm -f *.zip

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "Auto extract ZIP"
          git push
