name: Universal ZIP Decompress

on:
  workflow_dispatch:

  push:
    paths:
      - "*.zip"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Find and backup ZIP
        shell: bash
        run: |
          set -e

          ZIPFILE=$(find . -maxdepth 1 -type f -iname "*.zip" | head -n 1)

          if [ -z "$ZIPFILE" ]; then
            echo "No ZIP file found."
            exit 1
          fi

          echo "ZIP found: $ZIPFILE"

          cp "$ZIPFILE" /tmp/project.zip

          if [ ! -f /tmp/project.zip ]; then
            echo "Backup failed."
            exit 1
          fi

          echo "ZIPFILE=/tmp/project.zip" >> "$GITHUB_ENV"

      - name: Clean repository
        shell: bash
        run: |
          set -e

          find . -mindepth 1 \
            ! -path "./.git*" \
            ! -path "./.github*" \
            -exec rm -rf {} +

      - name: Extract ZIP into repository root
        shell: bash
        run: |
          set -e
          unzip -oq "$ZIPFILE" -d .

      - name: Flatten top folder
        shell: bash
        run: |
          set -e
          shopt -s dotglob nullglob

          DIRS=$(find . -mindepth 1 -maxdepth 1 -type d ! -name ".git" ! -name ".github" | wc -l)
          FILES=$(find . -mindepth 1 -maxdepth 1 -type f | wc -l)

          if [ "$DIRS" -eq 1 ] && [ "$FILES" -eq 0 ]; then
            DIR=$(find . -mindepth 1 -maxdepth 1 -type d ! -name ".git" ! -name ".github")

            echo "Flattening $DIR"

            mv "$DIR"/* .
            rmdir "$DIR"
          fi

      - name: Remove ZIP files
        shell: bash
        run: |
          rm -f *.zip

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "Auto extract ZIP"
          git push
